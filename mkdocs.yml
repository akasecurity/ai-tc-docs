site_name: aka AI-TC
site_description: Intercept, inspect, and govern AI prompts and responses across your engineering org
site_url: !ENV [DOCS_SITE_URL, 'https://akasecurity.github.io/docs/']
repo_name: akasecurity/ai-tc
repo_url: https://github.com/akasecurity/ai-tc
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  logo: assets/icon.svg
  favicon: assets/logomark.svg
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: material/web
      link: https://akasecurity.io
      name: akasecurity.io
    - icon: fontawesome/brands/github
      link: https://github.com/akasecurity
      name: GitHub
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/org/akasecurity
      name: npm

extra_css:
  - https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Public+Sans:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap
  - stylesheets/extra.css
  - stylesheets/home.css

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
      - Usage: getting-started/usage.md
      - Adding Exceptions: cli/exceptions.md
      - Configuration: getting-started/configuration.md
  - Plugin Guide:
      - Claude Code: plugin/claude-code.md
      - Claude Desktop: plugin/claude-code.md
  - Detections:
      - Built-in Detections: rules/built-in.md
      - Writing Rules: rules/writing-rules.md
      - Publishing: rules/publishing.md
  - Architecture Reference:
      - System Overview: architecture/overview.md
      - Detection Engine: architecture/detection-engine.md
